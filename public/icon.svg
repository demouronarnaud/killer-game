<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2a0a0a"/>
      <stop offset="60%" stop-color="#0f0f18"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e0d0"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#4a0000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Decorative corner glow -->
  <circle cx="150" cy="180" r="180" fill="#8b0000" opacity="0.15"/>

  <!-- Dagger group, rotated slightly -->
  <g transform="translate(256 256) rotate(-20)">
    <!-- Blade -->
    <path d="M 0 -180 L 22 -40 L 0 -10 L -22 -40 Z"
          fill="url(#blade)" stroke="#555" stroke-width="2"/>

    <!-- Crossguard -->
    <rect x="-60" y="-40" width="120" height="14" rx="3" fill="#8b0000" stroke="#4a0000" stroke-width="2"/>

    <!-- Handle -->
    <rect x="-14" y="-26" width="28" height="110" rx="6" fill="url(#handle)" stroke="#2a0000" stroke-width="1.5"/>

    <!-- Pommel -->
    <circle cx="0" cy="96" r="18" fill="#8b0000" stroke="#2a0000" stroke-width="2"/>
    <circle cx="0" cy="96" r="8" fill="#4a0000"/>

    <!-- Blade highlight -->
    <path d="M -4 -170 L -2 -40 L -4 -30 Z" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Blood drip -->
  <circle cx="340" cy="140" r="6" fill="#8b0000"/>
  <ellipse cx="340" cy="152" rx="4" ry="8" fill="#8b0000" opacity="0.8"/>
</svg>
